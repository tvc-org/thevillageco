name: CI

on:
  push:
  pull_request:

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Theme Check
        run: gem install theme-check -N

      - name: Run Theme Check
        run: theme-check
