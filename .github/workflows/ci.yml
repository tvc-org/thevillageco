name: CI

on:
  push:
  pull_request:

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run Theme Check
        run: npx --yes @shopify/cli@latest theme check
